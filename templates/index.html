<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SumTube — AI YouTube Summarizer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #ff0080, #7928ca, #0070f3); color: #fff; min-height: 100vh; }

        .hero { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; position: relative; overflow: hidden; }
        .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at top, rgba(255,255,255,0.1), transparent 70%); }

        .hero h1 { font-size: 36px; font-weight: 800; line-height: 1.2; margin-bottom: 12px; position: relative; z-index: 1; }
        .hero h1 span { background: linear-gradient(90deg, #fff, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 15px; color: rgba(255,255,255,0.8); margin-bottom: 40px; position: relative; z-index: 1; }

        .input-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 24px; width: 100%; max-width: 640px; position: relative; z-index: 1; }
        .input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-wrap input { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 12px; padding: 14px 16px; font-size: 14px; color: #fff; font-family: 'Inter', sans-serif; }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.5); }
        .input-wrap input:focus { outline: none; border-color: #fff; background: rgba(255,255,255,0.2); }
        .btn-main { background: #fff; border: none; border-radius: 12px; padding: 14px 24px; color: #7928ca; font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: 'Inter', sans-serif; transition: opacity 0.2s, transform 0.1s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .result-area { width: 100%; max-width: 640px; position: relative; z-index: 1; }

        .loader { text-align: center; padding: 40px; display: none; }
        .loader-ring { width: 48px; height: 48px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader p { color: rgba(255,255,255,0.7); font-size: 14px; }

        .error-box { background: rgba(255,50,50,0.2); border: 1px solid rgba(255,50,50,0.4); border-radius: 12px; padding: 16px; color: #ffaaaa; font-size: 14px; display: none; margin-top: 16px; }

        .result { display: none; margin-top: 20px; }
        .thumb { width: 100%; border-radius: 16px; margin-bottom: 20px; display: none; aspect-ratio: 16/9; object-fit: cover; }

        .source-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600; margin-bottom: 20px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .stat { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-num { font-size: 22px; font-weight: 700; color: #ffd700; }
        .stat-label { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }

        .section { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; padding: 20px; margin-bottom: 12px; text-align: left; }
        .section-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 10px; }
        .summary-text { font-size: 14px; line-height: 1.8; color: rgba(255,255,255,0.9); }

        .kp-list { list-style: none; }
        .kp-list li { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; color: rgba(255,255,255,0.85); display: flex; gap: 10px; line-height: 1.5; }
        .kp-list li:last-child { border-bottom: none; }
        .kp-dot { width: 6px; height: 6px; border-radius: 50%; background: #ffd700; flex-shrink: 0; margin-top: 7px; }

        .topics { display: flex; flex-wrap: wrap; gap: 8px; }
        .topic-tag { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 5px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; }

        footer { text-align: center; padding: 30px 20px; color: rgba(255,255,255,0.3); font-size: 13px; position: relative; z-index: 1; }
    </style>
</head>
<body>
<div class="hero">
    <h1>Summarize <span>YouTube Video</span></h1>
    <p>Paste a URL and get an instant AI summary, key points, and insights in seconds.</p>

    <div class="input-card">
        <div class="input-wrap">
            <input type="text" id="url" placeholder="https://www.youtube.com/watch?v=..." />
            <button class="btn-main" id="btn" onclick="summarize()">✨ Summarize</button>
        </div>
    </div>

    <div class="result-area">
        <div class="error-box" id="error"></div>
        <div class="loader" id="loader">
            <div class="loader-ring"></div>
            <p>Analyzing your video with AI...</p>
        </div>

        <div class="result" id="result">
            <img class="thumb" id="thumbnail" alt="Video thumbnail" />
            <span class="source-pill" id="source-badge"></span>

            <div class="stats">
                <div class="stat">
                    <div class="stat-num" id="stat-topics">—</div>
                    <div class="stat-label">Topics covered</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="stat-points">—</div>
                    <div class="stat-label">Key points</div>
                </div>
                <div class="stat">
                    <div class="stat-num" id="stat-sentiment">—</div>
                    <div class="stat-label">Sentiment</div>
                </div>
            </div>

            <div class="section">
                <div class="section-label">Summary</div>
                <p class="summary-text" id="summary"></p>
            </div>

            <div class="section">
                <div class="section-label">Key Points</div>
                <ul class="kp-list" id="key-points"></ul>
            </div>

            <div class="section">
                <div class="section-label">Topics</div>
                <div class="topics" id="topics"></div>
            </div>
        </div>
    </div>

    <footer>An AI-powered project by Mashiat Nabila</footer>
</div>

<script>
    const sentimentEmoji = { positive: '😊', neutral: '😐', educational: '📚', entertaining: '🎉', mixed: '🤔' };

    async function summarize() {
        const url = document.getElementById('url').value.trim();
        if (!url) { alert('Please paste a YouTube URL!'); return; }

        document.getElementById('btn').disabled = true;
        document.getElementById('btn').textContent = 'Analyzing...';
        document.getElementById('error').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            const res = await fetch('/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, length: 'brief', format: 'paragraph' })
            });
            const data = await res.json();

            if (data.error) {
                document.getElementById('error').textContent = '⚠️ ' + data.error;
                document.getElementById('error').style.display = 'block';
            } else {
                const thumb = document.getElementById('thumbnail');
                thumb.src = `https://img.youtube.com/vi/${data.video_id}/mqdefault.jpg`;
                thumb.style.display = 'block';

                const badge = document.getElementById('source-badge');
                badge.textContent = data.source === 'whisper' ? '🎙️ Transcribed with Whisper' : '📝 YouTube captions';

                document.getElementById('stat-topics').textContent = data.topics.length;
                document.getElementById('stat-points').textContent = data.key_points.length;
                document.getElementById('stat-sentiment').textContent = sentimentEmoji[data.sentiment] || '💬';

                document.getElementById('summary').textContent = data.summary;

                const kp = document.getElementById('key-points');
                kp.innerHTML = data.key_points.map(p => `<li><span class="kp-dot"></span>${p}</li>`).join('');

                const topics = document.getElementById('topics');
                topics.innerHTML = data.topics.map(t => `<span class="topic-tag">${t}</span>`).join('');

                document.getElementById('result').style.display = 'block';
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            }
        } catch(e) {
            document.getElementById('error').textContent = '⚠️ Something went wrong. Please try again.';
            document.getElementById('error').style.display = 'block';
        }

        document.getElementById('loader').style.display = 'none';
        document.getElementById('btn').disabled = false;
        document.getElementById('btn').textContent = '✨ Summarize';
    }

    document.getElementById('url').addEventListener('keydown', e => {
        if (e.key === 'Enter') summarize();
    });
</script>
</body>
</html>
